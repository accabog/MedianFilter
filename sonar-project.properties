sonar.projectKey=accabog_MedianFilter
sonar.organization=accabog

# Only analyze library source files
sonar.sources=.
sonar.inclusions=MedianFilter.c,MedianFilter.h,MedianFilter.hpp

# Exclude test and example files from source analysis
sonar.exclusions=tests/**,example.c

# Test files (for classification and coverage mapping)
sonar.tests=tests
sonar.test.inclusions=tests/stress_test.c,tests/circular_test.c,tests/test_cpp.cpp
